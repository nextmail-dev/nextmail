<!doctype html>
<html>
  <head>
    <meta name="color-scheme" content="light dark">
    <meta name="supported-color-schemes" content="light dark">
    <style>
      .card { background-color: #ffffff; color: #202124; padding: 20px; }
      @media (prefers-color-scheme: dark) {
        .card { background-color: #252525; color: #eeeeee; }
        .card a { color: #8ab4f8; }
      }
    </style>
  </head>
  <body>
    <div class="card">This message supplies its own dark palette. <a href="https://status.example.invalid/">View status</a></div>
  </body>
</html>
