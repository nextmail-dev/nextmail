<!doctype html>
<html>
  <head>
    <style>
      .campaign { width: 600px; max-width: 100%; margin: 0 auto; background-color: #ffffff; }
      .campaign-title { color: #172b4d; font-size: 28px; line-height: 1.25; }
      @media (max-width: 640px) {
        .campaign { width: 100%; }
        .campaign-cell { padding: 18px; }
      }
    </style>
  </head>
  <body style="margin:0;background-color:#eef1f5">
    <table class="campaign" role="presentation">
      <tr><td><img src="https://images.example.invalid/campaign/hero.png" alt="Product preview" style="display:block;width:100%;height:auto"></td></tr>
      <tr><td class="campaign-cell" style="padding:28px"><h1 class="campaign-title">A clearer inbox</h1><a href="https://www.example.invalid/learn-more?source=email">Learn more</a></td></tr>
    </table>
  </body>
</html>
