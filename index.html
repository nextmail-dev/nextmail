<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>NextMail</title>
    <style>
      html, body { width: 100%; height: 100%; margin: 0; background: #f7f8fb; }
      #startup-shell { position: fixed; inset: 0; z-index: 2147483647; display: grid; place-items: center; background: #f7f8fb; }
      #startup-indicator { width: 24px; height: 24px; border: 2px solid #dce2eb; border-top-color: #176bff; border-radius: 50%; animation: startup-spin .7s linear infinite; }
      @keyframes startup-spin { to { transform: rotate(360deg); } }
      @media (prefers-color-scheme: dark) {
        html, body, #startup-shell { background: #111318; }
        #startup-indicator { border-color: #30343b; border-top-color: #4f8cff; }
      }
    </style>
  </head>

  <body>
    <div id="startup-shell" role="status" aria-label="NextMail">
      <div id="startup-indicator"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
